# ROS2 硬件全局参数配置
# 通过通配符将这些参数应用到相应的节点

chassis_node:
  ros__parameters:
    # --- 1. 底盘单片机配置 ---
    port_name: "/dev/ttyCH343USB0"     # 单片机串口号
    baud_rate: 115200             # 单片机波特率

sllidar_node:
  ros__parameters:
    # --- 2. 激光雷达配置 (适用于思岚 C1) ---
    serial_port: "/dev/ttyUSB0"   # 雷达串口号
    serial_baudrate: 460800       # 思岚 C1 的默认波特率是 460800
    frame_id: "laser"             # 激光雷达坐标系名称
    angle_compensate: true        # 角度补偿
    scan_mode: "Standard"         # 扫描模式

usb_cam:
  ros__parameters:
    # --- 3. 摄像头配置 ---
    video_device: "/dev/video0"   # USB摄像头挂载路径
    image_width: 640              # 采集宽度
    image_height: 480             # 采集高度
    pixel_format: "yuyv"          # 像素格式
    camera_frame_id: "camera_link"

joy_node:
  ros__parameters:
    # --- 4. 遥控手柄配置 ---
    dev: "/dev/input/js0"         # 游戏手柄挂载路径
    deadzone: 0.05                # 摇杆死区

joy_to_cmd:
  ros__parameters:
    # --- 5. 遥控按键映射配置 ---
    # 已检测到当前手柄为 Microsoft X-Box 360 pad
    axis_linear: 1                # 左摇杆上下
    axis_angular: 3               # 右摇杆左右
    invert_linear_axis: true      # Xbox 360 手柄前推通常为负值，这里反向为前进
    invert_angular_axis: false    # 右打为正，保持默认方向
    max_linear_vel: 1.0           # 最大线速度 (m/s) (对应单片机满速 150)
    max_angular_vel: 1.0          # 最大角速度 (rad/s)
    btn_brake: 1                  # B 键紧急刹车
    btn_mode_switch: 0            # A 键切换 manual/auto/follow
